[app]
name = "ImageContinuum Demo"

[window]
width = 1280
height = 720
mode = "windowed"

[paths]
asset_root = "demo/res"
model_root = "demo/res/models"

[renderer]
backend = "DX12"
path = "PathTraced"
validation = true
debug_gui = true
frames_in_flight = 2
pipeline_library = "demo/res/pipelines/path_tracing.toml"

[scene]
file = "demo/res/scene_files/cornell_scene.toml"

